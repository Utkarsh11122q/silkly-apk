name: Build APK

# Runs when you push, or when you click "Run workflow" in the Actions tab.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest   # GitHub's runner already has the Android SDK installed
    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Add the Android platform
        run: npx cap add android

      - name: Copy the web app into the Android project
        run: npx cap sync android

      - name: Build the debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: silkly-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
